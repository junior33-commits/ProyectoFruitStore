<div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
        Detalle de Proveedor
    </div>
    <div class="card-body">
        <input type="hidden" id="txtIdProveedor">

        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" id="txtNombreProveedor">
            </div>
            <div class="col-md-4">
                <label class="form-label">Razón Social</label>
                <input type="text" class="form-control" id="txtRazonSocial">
            </div>
            <div class="col-md-4">
                <label class="form-label">RFC</label>
                <input type="text" class="form-control" id="txtRFC">
            </div>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-md-6">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control" id="txtDireccion">
            </div>
            <div class="col-md-3">
                <label class="form-label">Teléfono Fijo</label>
                <input type="text" class="form-control" id="txtTelefonoFijo">
            </div>
            <div class="col-md-3">
                <label class="form-label">Teléfono Móvil</label>
                <input type="text" class="form-control" id="txtTelefonoMovil">
            </div>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="txtEmailProveedor">
            </div>
            <div class="col-md-6">
                <label class="form-label">Estatus</label>
                <select class="form-control" id="cmbEstatusProveedor">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>
        </div>

        <div class="mt-4">
            <button class="btn btn-primary" onclick="guardarProveedor()">Guardar</button>
            <button class="btn btn-danger" onclick="eliminarProveedor()">Eliminar</button>
            <button class="btn btn-success" onclick="limpiar()">Nuevo</button>
        </div>
    </div>
</div>

<div class="card shadow">
    <div class="card-header bg-secondary text-white">
        Lista de Proveedores
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Razón Social</th>
                        <th>RFC</th>
                        <th>Teléfono</th>
                        <th>Estatus</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tbodyProveedores"></tbody>
            </table>
        </div>
    </div>
</div>
