<div class="card shadow mb-4">

    <div class="card-header bg-primary text-white">
        Detalle de Categoría
    </div>

    <div class="card-body">

        <input type="hidden" id="txtIdCategoria">

        <div class="row">

            <div class="col-md-6">
                <label>Nombre de la Categoría</label>
                <input type="text" class="form-control" id="txtNombreCategoria">
            </div>

        </div>

        <div class="mt-3">
            <button class="btn btn-primary" onclick="guardarCategoria()">Guardar</button>
            <button class="btn btn-danger" onclick="eliminarCategoria()">Eliminar</button>
            <button class="btn btn-success" onclick="nuevaCategoria()">Nuevo</button>
        </div>

    </div>

</div>

<div class="card shadow">
    <div class="card-header bg-secondary text-white">
        Catálogo de Categorías
    </div>

    <div class="card-body">
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Estatus</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tbodyCategorias"></tbody>
        </table>
    </div>
</div>
