<div class="card shadow mb-4 mt-4">
    <div class="card-header bg-primary text-white">
        Detalle de Vendedor
    </div>

    <div class="card-body">

        <input type="hidden" id="txtIdVendedor">

        <div class="row">
            <div class="col-md-4">
                <label>Nombre</label>
                <input type="text" class="form-control" id="txtNombreVendedor">
            </div>

            <div class="col-md-4">
                <label>Fecha de Nacimiento</label>
                <input type="date" class="form-control" id="txtFechaNac">
            </div>

            <div class="col-md-4">
                <label>Género</label>
                <select class="form-control" id="cmbGenero">
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                    <option value="O">Otro</option>
                </select>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-3">
                <label>Calle</label>
                <input type="text" class="form-control" id="txtCalle">
            </div>

            <div class="col-md-2">
                <label>No. Exterior</label>
                <input type="text" class="form-control" id="txtNumExt">
            </div>

            <div class="col-md-2">
                <label>No. Interior</label>
                <input type="text" class="form-control" id="txtNumInt">
            </div>

            <div class="col-md-3">
                <label>Colonia</label>
                <input type="text" class="form-control" id="txtColonia">
            </div>

            <div class="col-md-2">
                <label>C.P.</label>
                <input type="text" class="form-control" id="txtCP">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-3">
                <label>Ciudad</label>
                <input type="text" class="form-control" id="txtCiudad">
            </div>

            <div class="col-md-3">
                <label>Estado</label>
                <input type="text" class="form-control" id="txtEstado">
            </div>

            <div class="col-md-3">
                <label>País</label>
                <input type="text" class="form-control" id="txtPais">
            </div>

            <div class="col-md-3">
                <label>Teléfono</label>
                <input type="text" class="form-control" id="txtTelefono">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-4">
                <label>Email</label>
                <input type="email" class="form-control" id="txtEmailVendedor">
            </div>

            <div class="col-md-4">
                <label>Fecha Alta</label>
                <input type="date" class="form-control" id="txtFechaAlta">
            </div>

            <div class="col-md-4">
                <label>Estatus</label>
                <select class="form-control" id="cmbEstatusVendedor">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>
        </div>

        <div class="mt-4">
            <button class="btn btn-primary" onclick="guardarVendedor()">Guardar</button>
            <button class="btn btn-danger" onclick="eliminarVendedor()">Eliminar</button>
            <button class="btn btn-success" onclick="nuevoVendedor()">Nuevo</button>
        </div>

    </div>
</div>
<div class="card shadow">
    <div class="card-header bg-secondary text-white">
        Lista de Vendedores
    </div>

    <div class="card-body">
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Fecha Nac</th>
                    <th>Género</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Estatus</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tblVendedores"></tbody>
        </table>
    </div>
</div>
